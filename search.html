	<meta property="og:description" content="O Patos à Esquerda nasceu da iniciativa de um grupo de trabalhadores e trabalhadoras de diferentes áreas, alguns com militância prévia no amplo espectro da esquerda local que se formou após as &quot;Jornadas de Junho&quot; de 2013. Individual ou coletivamente, estivemos presentes no &quot;Ocupa Guiomar&quot; e no &quot;Ocupa M.B.&quot;, em 2016, nas mobilizações pela paralisação nacional, em 2017, no #Elenão, em 2018, e, mais recentemente, no Ato Político-Cultural &quot;Aliança por qual Brasil?&quot;, em 2020. A partir da participação nestas movimentações, fortaleceu-se a ideia de que as mudanças que almejamos demandavam um órgão periódico por meio do qual pudéssemos nos articular internamente e fazer a ponte com o restante da população trabalhadora.">
